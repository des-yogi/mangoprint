<article class="review-card">

  <div class="review-card__header">
    <div class="review-card__logo">
      <picture>
        <source srcset="img/@@logo.webp" type="image/webp">
        <img src="img/@@logo.png" alt="Alt text" width="230" height="57" loading="lazy">
      </picture>
    </div>
    <div class="review-card__quote"></div>
  </div>

  <div class="review-card__body">
    <header class="review-card__title">
      <h3 class="h4  review-card__author">@@author</h3>
      <p class="review-card__position">@@position</p>
    </header>

    <div class="js-collapser  review-card__text"
         data-height="140"
         data-collapser-scope="closest:.review-card">
      @@text
    </div>

    <div class="js-collapser-footer  review-card__more-wrapper">
      <button class="js-collapser-toggle  review-card__more" type="button">
        <span class="js-collapser-toggle-text"
              data-show-text="Розгорнути відгук"
              data-hide-text="Згорнути відгук">
          Розгорнути відгук
        </span>
      </button>
    </div>
  </div>

</article>
