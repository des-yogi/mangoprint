<div class="modal  fade"
     id="exampleModal"
     tabindex="-1"
     role="dialog"
     aria-labelledby="exampleModalTitle"
     aria-hidden="true">
  <div class="modal-dialog  modal-dialog-centered  modal-dialog-scrollable" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="h4  modal-title" id="exampleModalTitle">Розрахувати вартість проєкту</h4>
        <button class="btn  btn--white  btn--white--icon-only" type="button" data-bs-dismiss="modal" aria-label="Закрити">
          <span class="btn__icon">
            <svg width="20" height="20" aria-hidden="true"><use xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img/sprite-svg.svg#close-20"></use></svg>
          </span>
        </button>
      </div>
      <div class="modal-body">
        <p>Залиште свої дані, і наш менеджер підготує індивідуальну пропозицію для вашого бренду протягом 15 хвилин.</p>

        <form class="contact-form" action="#" method="post">

          <fieldset>
            <legend class="visually-hidden">Контактна інформація</legend>

            <label class="field-text">
              <span class="visually-hidden">Ім'я</span>
              <span class="field-text__input-wrap">
                <input class="field-text__input  field-text__input--required" type="text" name="name" value="" placeholder="Ім'я" autocomplete="name">
                <span class="field-text__help-text" data-error="name"></span>
              </span>
            </label>

            <label class="field-text">
              <span class="visually-hidden">Телефон</span>
              <span class="field-text__input-wrap">
                <input class="field-text__input  field-text__input--required  phone-mask" type="text" inputmode="tel" name="tel" value="" placeholder="+380…" autocomplete="tel">
                <span class="field-text__help-text" data-error="tel"></span>
              </span>
            </label>

            <label class="field-text">
              <span class="visually-hidden">E-mail</span>
              <span class="field-text__input-wrap">
                <input class="field-text__input" type="email" name="mail" value="" placeholder="E-mail" autocomplete="email">
                <span class="field-text__help-text" data-error="mail"></span>
              </span>
            </label>

            <label class="field-text">
              <span class="visually-hidden">Повідомлення</span>
              <span class="field-text__input-wrap">
                <textarea class="field-text__input" name="message" placeholder="Повідомлення" rows="4"></textarea>
                <span class="field-text__help-text" data-error="message"></span>
              </span>
            </label>
          </fieldset>

          <fieldset>
            <legend class="visually-hidden">Згода на обробку даних із форми</legend>

            <div class="field-actions  field-actions__agreement">
              <!-- <div class="field-actions__text">* — обязательные поля</div> -->
              <div class="field-checkbox" style="margin-bottom: 24px;">
                <label class="field-checkbox__name">
                  <input class="field-checkbox__input" type="checkbox" name="agreement" value="" checked>
                  <span class="field-checkbox__name-text">Натискаючи на кнопку ви погоджуєтесь на обробку персональних даних, отримання рекламних пропозицій. Погоджуєтесь з публічним <a href="#">договором оферти</a> та <a href="#">політикою конфіденційності</a></span>
                </label>
              </div>

              <button class="btn" type="submit" name="submit">
                <span class="btn__text">Надіслати</span>
                <span class="btn__icon">
                  <svg width="24" height="24" aria-hidden="true"><use xmlns:xlink="http://www.w3.org/1999/xlink" xlink:href="img/sprite-svg.svg#arrow-right"></use></svg>
                </span>
              </button>
            </div>
          </fieldset>
        </form>
      </div>

      <div class="modal-footer"></div>
    </div>
  </div>
</div>
